<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22c55e">

  <title>Lista de Compras</title>

  <link rel="manifest" href="manifest.json">

 <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <style>

    html, body {
  max-width: 100%;
  overflow-x: hidden;
}

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f2f4f8;
      padding:15px;
    }

    .container{
      max-width:1100px;
      margin:auto;
      background:#fff;
      padding:20px;
      border-radius:12px;
      box-shadow:0 4px 20px rgba(0,0,0,.08);
    }

    h1{
      text-align:center;
      margin-bottom:15px;
      color:#333;
    }

   .formulario {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* produto sozinho em cima */
#produto {
  width: 100%;
  height: 36px;
}

/* linha inferior */
.linha-secundaria {
  display: flex;
  gap: 8px;
}

/* campos menores na linha */
.linha-secundaria input,
.linha-secundaria select {
  flex: 1;
  min-width: 0;
  height: 36px;
}

/* botão */
.linha-secundaria button {
  flex: 0 0 auto;
  padding: 0 14px;
  height: 36px;
  white-space: nowrap;
}

    input,
    select,
    button{
      height:36px;
      border-radius:6px;
      border:1px solid #ddd;
      padding:6px 10px;
      font-size:13px;
    }

    button{
      border:none;
      cursor:pointer;
      font-weight:bold;
      color:#fff;
      transition:.2s;
    }

    button:hover{
      opacity:.9;
    }

    .btn-salvar{
      background:#22c55e;
    }

    .btn-txt{
      background:#6b7280;
    }

    .btn-pdf{
      background:#dc2626;
    }

    .btn-print{
      background:#0891b2;
    }

    .btn-export{
      background:#2563eb;
    }

    .btn-import{
      background:#16a34a;
    }

    .btn-editar{
      background:#22c55e;
      padding:5px 8px;
    }

    .btn-excluir{
      background:#ef4444;
      padding:5px 8px;
    }

    .acoes-topo{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:15px;
    }

    .acoes-topo button{
      flex:1;
      min-width:120px;
    }

    #pesquisa{
      width:100%;
      margin-bottom:15px;
    }

    .tabela-wrapper{
      width:100%;
      overflow-x:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      table-layout: fixed;
    }

    th,
    td{
      padding:8px;
      border-bottom:1px solid #eee;
      text-align:center;
      word-break: break-word;
    }

    th{
      background:#007bff;
      color:#fff;
    }

    tr:hover{
      background:#f5f7fa;
    }

    .comprado td{
      text-decoration:line-through;
      opacity:.6;
      background:#e8f5e9;
    }

    .total{
      margin-top:15px;
      text-align:right;
      font-size:18px;
      font-weight:bold;
    }

    @media(max-width:768px){

      body{
        padding:10px;
      }

      .container{
        padding:15px;
      }

      input, select {
  max-width: 100%;
  box-sizing: border-box;
}

       .formulario {
    gap: 6px;
  }

  .formulario input,
  .formulario select {
    font-size: 12px;
    height: 34px;
  }

  .formulario button {
    font-size: 12px;
    height: 34px;
    padding: 0 10px;
  }

      .linha-secundaria {
    flex-wrap: nowrap;
    gap: 6px;
  }

  .linha-secundaria input,
  .linha-secundaria select {
    font-size: 12px;
  }

  .linha-secundaria button {
    font-size: 12px;
  }

      .acoes-topo{
        display:grid;
        grid-template-columns:repeat(2,1fr);
      }

      table{
        font-size:11px;
      }

      th,
      td{
        padding:4px;
      }

      td:first-child{
        min-width:120px;
        text-align:left;
        word-break:break-word;
      }

      td:last-child{
        white-space:nowrap;
      }

      .btn-editar,
      .btn-excluir{
        padding:4px 6px;
        font-size:10px;
      }

      .total{
        text-align:center;
      }
    }

    @media print{

      body{
        background:#fff;
        padding:0;
      }

      .formulario,
      .acoes-topo,
      #pesquisa{
        display:none;
      }

      .container{
        box-shadow:none;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Lista de Compras</h1>

   <div class="formulario">

  <input type="text" id="produto" placeholder="Produto">

  <div class="linha-secundaria">

    <input type="number" id="quantidade" placeholder="Qtd">

    <input type="number" id="valor" placeholder="Valor">

    <select id="tipo">
      <option>Unidade</option>
      <option>Peso</option>
    </select>

    <button type="button" onclick="salvarItem()">
      Salvar
    </button>

  </div>

</div>

    <div class="acoes-topo">
<br>
      <button class="btn-txt" onclick="exportarTXT()">
        📄 TXT
      </button>

      <button class="btn-pdf" onclick="exportarPDF()">
        📕 PDF
      </button>

      <button class="btn-print" onclick="window.print()">
        🖨️ Imprimir
      </button>

      <!--<button class="btn-export" onclick="exportarLista()">
        ⬇️ Exportar
      </button>

      <button class="btn-import"
        onclick="document.getElementById('arquivo').click()">
        ⬆️ Importar
      </button>-->

      <input type="file" id="arquivo" hidden accept=".json">

    </div>

    <input type="text"
      id="pesquisa"
      placeholder="Pesquisar produto...">

    <div class="tabela-wrapper">

      <table>

        <thead>
          <tr>
            <th>Produto</th>
            <th>Qtd</th>
            <th>Valor</th>
            <th>Total</th>
            <th>✔</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody id="tabelaItens"></tbody>

      </table>

    </div>

    <div class="total">
      Total: R$
      <span id="totalLista">0.00</span>
    </div>

  </div>

  <script>

    window.onload = () => {
  console.log("Página carregou");
  console.log(lista);
  renderizarTabela();
};

    let lista = [];

try {
  const data = localStorage.getItem("lista");
  lista = data ? JSON.parse(data) : [];
} catch (e) {
  console.log("erro storage, resetando lista");
  lista = [];
}

    let editando = null;

    let idAtual =
      Number(localStorage.getItem("id")) || 1;

    const $ = id =>
      document.getElementById(id);

    function salvarStorage(){

      localStorage.setItem(
        "lista",
        JSON.stringify(lista)
      );

      localStorage.setItem(
        "id",
        idAtual
      );
    }

    function limparCampos(){

      $("produto").value = "";
      $("quantidade").value = "";
      $("valor").value = "";
      $("tipo").value = "Unidade";

      editando = null;
    }

    function salvarItem(){

      const produto =
        $("produto").value.trim();

      const quantidade =
        parseFloat(
          $("quantidade").value.replace(",", ".")
        );

      const valor =
        parseFloat(
          $("valor").value.replace(",", ".")
        );

      const tipo =
        $("tipo").value;

      if(
        !produto ||
        quantidade <= 0 ||
        valor <= 0
      ){
        alert("Preencha os campos corretamente.");
        return;
      }

      const item = {

        id: editando || idAtual++,

        produto,

        quantidade,

        valor,

        tipo,

        comprado:false
      };

      if(editando){

        const index =
          lista.findIndex(
            i => i.id === editando
          );

        item.comprado =
          lista[index].comprado;

        lista[index] = item;

      }else{

        lista.push(item);

      }

      salvarStorage();

      limparCampos();

      renderizarTabela();
    }

    function renderizarTabela(
      filtro = lista
    ){
console.log("renderizando...");
      const tbody =
        $("tabelaItens");

      tbody.innerHTML = "";

      let total = 0;

      filtro.forEach(item => {

        const subtotal =
          item.quantidade * item.valor;

        total += subtotal;

        const tr =
          document.createElement("tr");

        if(item.comprado){
          tr.classList.add("comprado");
        }

        tr.innerHTML = `

          <td>${item.produto}</td>

          <td>
            ${item.quantidade}
          </td>

          <td>
            R$ ${item.valor.toFixed(2)}
          </td>

          <td>
            R$ ${subtotal.toFixed(2)}
          </td>

          <td>

            <input
              type="checkbox"

              ${item.comprado ? "checked" : ""}

              onchange="toggleComprado(${item.id})"
            >

          </td>

          <td>

            <button
              class="btn-editar"
              onclick="editar(${item.id})"
            >
              ✏️
            </button>

            <button
              class="btn-excluir"
              onclick="excluir(${item.id})"
            >
              🗑️
            </button>

          </td>
        `;

        tbody.appendChild(tr);

      });

      $("totalLista").textContent =
        total.toFixed(2);
    }

    function editar(id){

      const item =
        lista.find(i => i.id === id);

      if(!item) return;

      $("produto").value =
        item.produto;

      $("quantidade").value =
        item.quantidade;

      $("valor").value =
        item.valor;

      $("tipo").value =
        item.tipo;

      editando = id;
    }

    function excluir(id){

      lista =
        lista.filter(i => i.id !== id);

      salvarStorage();

      renderizarTabela();
    }

    function toggleComprado(id){

      const item =
        lista.find(i => i.id === id);

      if(!item) return;

      item.comprado =
        !item.comprado;

      salvarStorage();

      renderizarTabela();
    }

    $("pesquisa")
      .addEventListener("input", function(){

      const termo =
        this.value.toLowerCase();

      const filtrado =
        lista.filter(i =>
          i.produto
          .toLowerCase()
          .includes(termo)
        );

      renderizarTabela(filtrado);

    });

    function gerarTXT(){

      let texto = "";

      let total = 0;

      texto +=
        "=============================\n";

      texto +=
        "      LISTA DE COMPRAS\n";

      texto +=
        "=============================\n\n";

      lista.forEach(item => {

        const subtotal =
          item.quantidade * item.valor;

        total += subtotal;

        texto +=
          `${item.produto} | ` +
          `Qtd: ${item.quantidade} | ` +
          `R$ ${subtotal.toFixed(2)}\n`;

      });

      texto +=
        "\n=============================\n";

      texto +=
        `TOTAL: R$ ${total.toFixed(2)}\n`;

      return texto;
    }

    function exportarTXT(){

      const blob =
        new Blob(
          [gerarTXT()],
          { type:"text/plain;charset=utf-8" }
        );

      const link =
        document.createElement("a");

      link.href =
        URL.createObjectURL(blob);

      link.download =
        "lista_compras.txt";

      link.click();
    }

    function gerarPDF(){

      const { jsPDF } =
        window.jspdf;

      const doc =
        new jsPDF();

      let total = 0;

      const linhas =
        lista.map(item => {

        const subtotal =
          item.quantidade * item.valor;

        total += subtotal;

        return [

          item.produto,

          item.quantidade,

          item.valor.toFixed(2),

          subtotal.toFixed(2)

        ];

      });

      doc.text(
        "LISTA DE COMPRAS",
        14,
        15
      );

      doc.autoTable({

        startY:20,

        head:[
          ["Produto","Qtd","Valor","Total"]
        ],

        body:linhas,

        theme:"grid"

      });

      const y =
        doc.lastAutoTable.finalY || 20;

      doc.text(
        `TOTAL: R$ ${total.toFixed(2)}`,
        14,
        y + 10
      );

      return doc;
    }

    function exportarPDF(){

      gerarPDF()
        .save("lista_compras.pdf");
    }

    function exportarLista(){

      const blob =
        new Blob(

          [JSON.stringify(lista,null,2)],

          {
            type:"application/json"
          }

        );

      const link =
        document.createElement("a");

      link.href =
        URL.createObjectURL(blob);

      link.download =
        "lista_compras.json";

      link.click();
    }

    $("arquivo")
      .addEventListener(
        "change",
        importarLista
      );

    function importarLista(event){

      const arquivo =
        event.target.files[0];

      if(!arquivo) return;

      const leitor =
        new FileReader();

      leitor.onload = e => {

        try{

          const dados =
            JSON.parse(e.target.result);

          if(!Array.isArray(dados)){

            alert("Arquivo inválido");

            return;
          }

          lista = dados;

          idAtual =
            lista.length
            ? Math.max(...lista.map(i => i.id)) + 1
            : 1;

          salvarStorage();

          renderizarTabela();

          alert("Lista importada com sucesso!");

        }catch{

          alert("Erro ao importar arquivo");

        }
      };

      leitor.readAsText(arquivo);
    }

    renderizarTabela();

    console.log("lista:", lista);
renderizarTabela();
  </script>

</body>
</html>
