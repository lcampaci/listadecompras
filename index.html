<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="./icon-192.png">
  <link rel="manifest" href="./manifest.json">
  <meta name="author" content="Luis Henrique Campaci">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Lista de Compras</title>

  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script defer
    src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <style>
    /* topo */
    .topo-app {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .topo-app h1 {
      margin: 0;
      flex: 1;
      text-align: center;
    }

    /* botão tema */
    #toggleTema {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: #111827;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }



    html,
    body {
      max-width: 100%;
      overflow-x: hidden;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f2f4f8;
      padding: 15px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .08);
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
      color: #333;
    }

    .formulario {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    tbody tr {
      cursor: pointer;
    }

    /* produto sozinho em cima */
    #produto {
      width: 100%;
      height: 36px;
    }

    /* linha inferior */
    .linha-secundaria {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
      align-items: center;
    }

    /* campos menores na linha */
    .linha-secundaria input,
    .linha-secundaria select {
      flex: 1;
      min-width: 0;
    }

    /* botão */
    .linha-secundaria button {
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 6px;
      flex: 0 0 120px;
      height: 36px;
    }

    /* =========================
   CHECKBOX BONITO
========================= */


    .check-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      margin: auto;
      cursor: pointer;
    }

    .check-container input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .checkmark {
      position: absolute;
      inset: 0;
      background: #e5e7eb;
      border-radius: 6px;
      transition: .2s;
      border: 2px solid #cbd5e1;
    }

    .checkmark::after {
      content: "";
      position: absolute;
      display: none;

      left: 7px;
      top: 2px;

      width: 5px;
      height: 10px;

      border: solid white;
      border-width: 0 3px 3px 0;

      transform: rotate(45deg);
    }

    .check-container input:checked+.checkmark {
      background: #22c55e;
      border-color: #22c55e;
    }

    .check-container input:checked+.checkmark::after {
      display: block;
    }

    input,
    select {
      height: 36px;
      border-radius: 6px;
      border: 1px solid #ddd;
      padding: 6px 10px;
      font-size: 13px;
      box-sizing: border-box;
      text-transform: uppercase;
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: bold;
      color: #fff;
      transition: .2s;
    }

    button:hover {
      opacity: .9;
    }

    .btn-salvar {
      background: #22c55e;
    }

    .btn-txt {
      background: #6b7280;
    }

    .btn-pdf {
      background: #dc2626;
    }

    .btn-print {
      background: #0891b2;
    }

    .btn-export {
      background: #2563eb;
    }

    .btn-import {
      background: #16a34a;
    }

    .btn-editar {
      background: #22c55e;
      padding: 5px 8px;
    }

    .btn-excluir {
      background: #ef4444;
      padding: 5px 8px;
    }

    .acoes-topo {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      width: 100%;
    }

    .acoes-topo button {
      flex: 1;
      height: 34px;
      font-size: 11px;
      padding: 4px 6px;
      white-space: nowrap;
    }

    #pesquisa {
      width: 100%;
      margin-bottom: 15px;
    }

    .tabela-wrapper {
      width: 100%;
      overflow-x: auto;
      max-height: 430px;
      overflow-y: auto;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      padding: 8px;
      border-bottom: 1px solid #eee;

      word-break: break-word;
    }

    th {
      background: #007bff;
      color: #fff;
    }

    tr:hover {
      background: #f5f7fa;
    }

    .comprado td {
      text-decoration: line-through;
      opacity: .6;
      background: #e8f5e9;
    }

    th:nth-child(1),
    td:nth-child(1) {
      width: 1%;
      padding: 4px 2px;
      text-align: center;
      white-space: nowrap;
    }

    /* produto */
    th:nth-child(2),
    td:nth-child(2) {
      width: 40%;
    }

    .total {
      margin-top: 15px;
      text-align: right;
      font-size: 18px;
      font-weight: bold;
    }

    @media(max-width:768px) {

      body {
        padding: 10px;
      }

      .container {
        padding: 15px;
      }

      input,
      select {
        max-width: 100%;
        box-sizing: border-box;
      }

      .formulario {
        gap: 6px;
      }

      .formulario input,
      .formulario select {
        font-size: 12px;
        height: 34px;
      }

      .formulario button {
        font-size: 12px;
        height: 34px;
        padding: 0 10px;
      }

      .linha-secundaria {
        gap: 6px;
      }

      .linha-secundaria button {
        flex: 0 0 80px;
        height: 34px;
      }

      .linha-secundaria input,
      .linha-secundaria select {
        font-size: 12px;
      }

      .acoes-topo {
        gap: 4px;
      }

      .acoes-topo button {
        flex: 1;
        min-width: 0;
        font-size: 10px;
        height: 32px;
        padding: 2px;
      }

      table {
        font-size: 11px;
      }

      th,
      td {
        padding: 4px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: auto;
      }

      /* numeração */
      th:nth-child(1),
      td:nth-child(1) {
        width: 20px;
        padding: 2px;
        font-size: 10px;
        text-align: center;
      }

      /* produto */
      th:nth-child(2),
      td:nth-child(2) {
        width: auto;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* qtd */
      th:nth-child(3),
      td:nth-child(3) {
        width: 45px;
      }

      /* valor */
      th:nth-child(4),
      td:nth-child(4) {
        width: 70px;
      }

      /* total */
      th:nth-child(5),
      td:nth-child(5) {
        width: 70px;
      }

      /* check */
      th:nth-child(6),
      td:nth-child(6) {
        width: 36px;
        text-align: center;
      }

      td:last-child {
        white-space: nowrap;
      }

      .btn-editar,
      .btn-excluir {
        padding: 4px 6px;
        font-size: 10px;
      }

      .total {
        margin-top: 15px;
        text-align: right;
        font-size: 18px;
        font-weight: bold;
        padding-right: 5px;
      }
    }

    @media print {

      body {
        background: #fff;
        padding: 0;
      }

      .formulario,
      .acoes-topo,
      #pesquisa {
        display: none;
      }

      .container {
        box-shadow: none;
      }
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal-conteudo {
      background: #fff;
      width: 90%;
      max-width: 320px;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      animation: fade .2s ease;
    }

    .modal-conteudo h3 {
      margin-bottom: 18px;
      color: #333;
      font-size: 18px;
    }

    .modal-botoes {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-botoes button {
      height: 42px;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: bold;
      font-size: 14px;
    }

    .btn-cancelar {
      background: #6b7280;
    }

    @keyframes fade {
      from {
        transform: scale(.95);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="topo-app">
      <h1>Lista de Compras</h1>
    </div>

    <div class="formulario">

      <input type="text" id="produto" placeholder="Produto">

      <div class="linha-secundaria">

        <input type="number" id="quantidade" placeholder="Qtd">

        <input type="number" id="valor" placeholder="Valor">

        <select id="tipo">
          <option>Unidade</option>
          <option>Peso</option>
        </select>

        <button type="button" class="btn-salvar" onclick="salvarItem()">
          Salvar
        </button>

      </div>

    </div>

    <div class="acoes-topo">

      <button class="btn-txt" onclick="exportarTXT()">
        📄 TXT
      </button>

      <button class="btn-pdf" onclick="exportarPDF()">
        📕 PDF
      </button>

      <button class="btn-export" onclick="exportarLista()">
        ⬇️ Backup
      </button>

      <button class="btn-import" onclick="document.getElementById('arquivo').click()">
        ⬆️ Importar
      </button>

      <input type="file" id="arquivo" hidden accept=".json">

    </div>
    <br>
    <input type="text" id="pesquisa" placeholder="Pesquisar produto...">

    <div class="tabela-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Produto</th>
            <th style="text-align:right;">Qtd</th>
            <th style="text-align:right;">Valor</th>
            <th style="text-align:right;">Total</th>
            <th style="text-align:center;">✔</th>
          </tr>
        </thead>

        <tbody id="tabelaItens"></tbody>

      </table>

    </div>

    <div class="total">

      Itens:
      <span id="totalItens">0</span>

      <br>

      Total: R$
      <span id="totalLista">0.00</span>

    </div>

  </div>

  <script>

    document.addEventListener("DOMContentLoaded", () => {

      console.log("Página carregou");

      console.log(lista);

      renderizarTabela();

      // 👇 AQUI
      if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log("Rodando como PWA");
      }

      const modal = $("modalAcoes");

      const modalConteudo =
        document.querySelector(".modal-conteudo");

      /* clicar fora fecha */
      modal.addEventListener("click", () => {

        fecharModal();
        /* vibração forte ao salvar */
        vibrar([80, 40, 80]);

      });

      /* clicar dentro NÃO fecha */
      modalConteudo.addEventListener("click", (e) => {

        e.stopPropagation();

      });

    });

    let lista = [];

    try {
      const data = localStorage.getItem("lista");
      lista = data ? JSON.parse(data) : [];
    } catch (e) {
      console.log("erro storage, resetando lista");
      lista = [];
    }

    let editando = null;

    let idAtual =
      Number(localStorage.getItem("id")) || 1;

    const $ = id =>
      document.getElementById(id);



    function salvarStorage() {

      localStorage.setItem(
        "lista",
        JSON.stringify(lista)
      );

      localStorage.setItem(
        "id",
        idAtual
      );
    }

    let itemSelecionado = null;

    function abrirModal(id) {

      itemSelecionado = id;

      const item =
        lista.find(i => i.id === id);

      if (!item) return;

      $("modalTitulo").textContent =
        item.produto;

      $("modalAcoes").style.display =
        "flex";
    }

    /* =========================
   VIBRAÇÃO
========================= */

    function vibrar(tempo = 40) {

      if (navigator.vibrate) {

        navigator.vibrate(tempo);

      }
    }

    /* vibração em TODOS os botões */
    document.addEventListener("click", e => {

      if (
        e.target.tagName === "BUTTON" ||
        e.target.type === "checkbox"
      ) {

        vibrar();

      }

    });

    function fecharModal() {

      $("modalAcoes").style.display =
        "none";

      itemSelecionado = null;
    }


    function editarItemModal() {

      if (itemSelecionado) {

        editar(itemSelecionado);
        vibrar();
        fecharModal();
      }
    }

    function excluirItemModal() {

      if (itemSelecionado) {

        if (confirm("Excluir item?")) {

          excluir(itemSelecionado);
          vibrar();
          fecharModal();
        }
      }
    }

    function limparCampos() {

      $("produto").value = "";
      $("quantidade").value = "";
      $("valor").value = "";
      $("tipo").value = "Unidade";

      editando = null;
    }

    function salvarItem() {

      const produto =
        $("produto")
          .value
          .trim()
          .toUpperCase();

      const quantidade =
        parseFloat(
          $("quantidade").value.replace(",", ".")
        );

      const valor =
        parseFloat(
          $("valor").value.replace(",", ".")
        ) || 0;

      const tipo =
        $("tipo").value;

      if (
        !produto ||
        quantidade <= 0
      ) {
        alert("Preencha os campos corretamente.");
        return;
      }

      const item = {

        id: editando || idAtual++,

        produto,

        quantidade,

        valor,

        tipo,

        comprado: false
      };

      if (editando) {

        const index =
          lista.findIndex(
            i => i.id === editando
          );

        item.comprado =
          lista[index].comprado;

        lista[index] = item;

      } else {

        lista.push(item);

      }

      salvarStorage();

      /* vibração forte ao salvar */
      vibrar([80, 40, 80]);

      limparCampos();

      renderizarTabela();
    }

    function renderizarTabela(filtro = lista) {

      const tbody = $("tabelaItens");

      tbody.innerHTML = "";

      let total = 0;

      filtro.forEach((item, index) => {

        const subtotal =
          item.quantidade * item.valor;

        total += subtotal;

        const tr =
          document.createElement("tr");

        if (item.comprado) {
          tr.classList.add("comprado");
        }

        tr.onclick = () => abrirModal(item.id);

        tr.innerHTML = `

	  <td style="text-align:center;">
	    ${index + 1}
	  </td>

  	  <td>${item.produto}</td>

      <td style="text-align:right;">
        ${item.quantidade}
      </td>

      <td style="text-align:right;">
        R$ ${item.valor.toFixed(2)}
      </td>

      <td style="text-align:right;">
        R$ ${subtotal.toFixed(2)}
      </td>

      <td style="text-align:center; vertical-align:middle;">

  <label
    class="check-container"
    onclick="event.stopPropagation()"
>

  <input
    type="checkbox"
    ${item.comprado ? "checked" : ""}
    onchange="toggleComprado(${item.id})"
  >

  <span class="checkmark"></span>

</label>

      </td>

    `;

        tbody.appendChild(tr);

      });

      $("totalItens").textContent =
        filtro.length;

      $("totalLista").textContent =
        total.toFixed(2);
    }
    function editar(id) {

      const item =
        lista.find(i => i.id === id);

      if (!item) return;

      $("produto").value =
        item.produto;

      $("quantidade").value =
        item.quantidade;

      $("valor").value =
        item.valor;

      $("tipo").value =
        item.tipo;

      editando = id;
    }

    function excluir(id) {

      lista =
        lista.filter(i => i.id !== id);

      salvarStorage();
      vibrar();
      renderizarTabela();
    }

    function toggleComprado(id) {

      const item =
        lista.find(i => i.id === id);

      if (!item) return;

      item.comprado =
        !item.comprado;

      salvarStorage();
      vibrar();
      renderizarTabela();
    }

    $("pesquisa")
      .addEventListener("input", function () {

        const termo =
          this.value.toLowerCase();

        const filtrado =
          lista.filter(i =>
            i.produto
              .toLowerCase()
              .includes(termo)
          );

        renderizarTabela(filtrado);

      });

    function gerarTXT() {

      let texto = "";

      let total = 0;

      // largura fixa das colunas
      const COL_PRODUTO = 28;
      const COL_QTD = 8;
      const COL_VALOR = 12;
      const COL_TOTAL = 12;

      // função auxiliar
      const linha = (
        produto,
        qtd,
        valor,
        subtotal
      ) => {

        return (
          produto.padEnd(COL_PRODUTO) +
          qtd.padStart(COL_QTD) +
          valor.padStart(COL_VALOR) +
          subtotal.padStart(COL_TOTAL)
        );

      };

      texto +=
        `============================================================
                     LISTA DE COMPRAS
============================================================

`;

      // cabeçalho
      texto += linha(
        "PRODUTO",
        "QTD",
        "VALOR",
        "TOTAL"
      );

      texto += "\n";

      texto +=
        `${"-".repeat(60)}\n`;

      lista.forEach(item => {

        const subtotal =
          item.quantidade * item.valor;

        total += subtotal;

        texto += linha(

          item.produto.substring(0, COL_PRODUTO - 1),

          item.quantidade.toString(),

          `R$ ${item.valor.toFixed(2)}`,

          `R$ ${subtotal.toFixed(2)}`

        );

        texto += "\n";

      });

      texto +=
        `${"-".repeat(60)}\n`;

      texto +=
        `TOTAL GERAL: R$ ${total.toFixed(2)}\n`;

      return texto;
    }

    function exportarTXT() {

      const texto = gerarTXT();

      // BOM UTF-8
      const blob = new Blob(
        ["\uFEFF" + texto],
        { type: "text/plain;charset=utf-8" }
      );

      const link = document.createElement("a");

      link.href = URL.createObjectURL(blob);

      link.download = "lista_compras.txt";

      link.click();

      URL.revokeObjectURL(link.href);
    }
    function gerarPDF() {

      const { jsPDF } =
        window.jspdf;

      const doc =
        new jsPDF();

      let total = 0;

      const linhas =
        lista.map(item => {

          const subtotal =
            item.quantidade * item.valor;

          total += subtotal;

          return [

            item.produto,

            item.quantidade,

            item.valor.toFixed(2),

            subtotal.toFixed(2)

          ];

        });

      doc.text(
        "LISTA DE COMPRAS",
        14,
        15
      );

      doc.autoTable({

        startY: 20,

        head: [
          ["Produto", "Qtd", "Valor", "Total"]
        ],

        body: linhas,

        theme: "grid"

      });

      const y =
        doc.lastAutoTable.finalY || 20;

      doc.text(
        `TOTAL: R$ ${total.toFixed(2)}`,
        14,
        y + 10
      );

      return doc;
    }

    function exportarPDF() {

      gerarPDF()
        .save("lista_compras.pdf");
    }

    function exportarLista() {

      const blob =
        new Blob(

          [JSON.stringify(lista, null, 2)],

          {
            type: "application/json"
          }

        );

      const link =
        document.createElement("a");

      link.href =
        URL.createObjectURL(blob);

      link.download =
        "lista_compras.json";

      link.click();
    }

    $("arquivo")
      .addEventListener(
        "change",
        importarLista
      );

    function importarLista(event) {

      const arquivo =
        event.target.files[0];

      if (!arquivo) return;

      const leitor =
        new FileReader();

      leitor.onload = e => {

        try {

          const dados =
            JSON.parse(e.target.result);

          if (!Array.isArray(dados)) {

            alert("Arquivo inválido");

            return;
          }

          lista = dados;

          idAtual =
            lista.length
              ? Math.max(...lista.map(i => i.id)) + 1
              : 1;

          salvarStorage();

          renderizarTabela();

          alert("Lista importada com sucesso!");

        } catch {

          alert("Erro ao importar arquivo");

        }
      };

      leitor.readAsText(arquivo);
    }

    console.log("lista:", lista);

    if ("serviceWorker" in navigator) {

      navigator.serviceWorker.register("./service-worker.js")
        .then(() => {
          console.log("PWA instalada!");
        })
        .catch(err => {
          console.log("Erro:", err);
        });

    }
  </script>

  <div id="modalAcoes" class="modal">

    <div class="modal-conteudo">

      <h3 id="modalTitulo"></h3>

      <div class="modal-botoes">

        <button class="btn-editar" onclick="editarItemModal()">
          ✏️ Alterar
        </button>

        <button class="btn-excluir" onclick="excluirItemModal()">
          🗑️ Excluir
        </button>
